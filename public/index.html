<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAOVERSE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #4DB8C8;
      --bg: #0a0a0a;
      --surface: #111111;
      --text: #e8e8e8;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    header {
      text-align: center;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo span {
      color: var(--text);
    }

    .tagline {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .quote-area {
      width: 100%;
      min-height: 140px;
      background: var(--surface);
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .quote-area::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    #quote-text {
      font-size: 1.25rem;
      font-weight: 300;
      line-height: 1.8;
      text-align: center;
      color: var(--text);
      transition: opacity 0.4s ease;
    }

    #quote-text.placeholder {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    #quote-text.loading {
      opacity: 0.3;
    }

    .cta-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .cta-label {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
    }

    button {
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.9rem 2.5rem;
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 24px rgba(77, 184, 200, 0.3);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(77, 184, 200, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    .spinner.active {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      font-size: 0.7rem;
      color: #2a2a2a;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">NAO<span>VERSE</span></div>
      <div class="tagline">NAO × Claude — Today's Word</div>
    </header>

    <div class="quote-area">
      <p id="quote-text" class="placeholder">ボタンを押して、今日の一言を受け取る</p>
    </div>

    <div class="cta-section">
      <p class="cta-label">NAOとAIのClaudeがタッグを組んであなたへ贈る今日の一言</p>
      <button id="generate-btn" onclick="generateQuote()">Generate</button>
      <div class="spinner" id="spinner"></div>
    </div>

    <footer>NAOVERSE © 2026</footer>
  </div>

  <script>
    const STORAGE_KEY = 'naoverse_last_date';
    const QUOTE_KEY = 'naoverse_last_quote';

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function hasGeneratedToday() {
      return localStorage.getItem(STORAGE_KEY) === todayStr();
    }

    function showTomorrowMessage() {
      const btn = document.getElementById('generate-btn');
      const quoteEl = document.getElementById('quote-text');
      quoteEl.classList.remove('placeholder', 'loading');
      quoteEl.textContent = 'また明日ね。';
      btn.disabled = true;
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (hasGeneratedToday()) {
        const saved = localStorage.getItem(QUOTE_KEY);
        const quoteEl = document.getElementById('quote-text');
        if (saved) {
          quoteEl.classList.remove('placeholder');
          quoteEl.textContent = saved;
        }
        document.getElementById('generate-btn').disabled = true;
      }
    });

    async function generateQuote() {
      if (hasGeneratedToday()) {
        showTomorrowMessage();
        return;
      }

      const btn = document.getElementById('generate-btn');
      const quoteEl = document.getElementById('quote-text');
      const spinner = document.getElementById('spinner');

      btn.disabled = true;
      quoteEl.classList.add('loading');
      quoteEl.classList.remove('placeholder');
      spinner.classList.add('active');

      try {
        const res = await fetch('/api/quote');
        const data = await res.json();
        if (data.quote) {
          quoteEl.textContent = data.quote;
          localStorage.setItem(STORAGE_KEY, todayStr());
          localStorage.setItem(QUOTE_KEY, data.quote);
        } else {
          quoteEl.textContent = `[Error ${res.status}] ${data.error ?? 'Unknown error'}`;
          quoteEl.classList.add('placeholder');
          btn.disabled = false;
        }
      } catch (err) {
        quoteEl.textContent = `[Network Error] ${err.message}`;
        quoteEl.classList.add('placeholder');
        btn.disabled = false;
      } finally {
        quoteEl.classList.remove('loading');
        spinner.classList.remove('active');
      }
    }
  </script>
</body>
</html>
